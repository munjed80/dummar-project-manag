services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: dummar
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env (run ./deploy.sh to auto-generate, or copy from PRODUCTION_DEPLOYMENT_GUIDE.md)}
      POSTGRES_DB: dummar_db
    # Port NOT exposed externally for security.
    # To access DB from the host, use: docker compose exec db psql -U dummar dummar_db
    # Uncomment only for local development:
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dummar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    # Broker + result backend for the Celery worker.  Not exposed externally.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 192M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Bind to localhost only — nginx is the public entry point.
    # Direct external exposure would bypass nginx rate limits and security headers.
    # Set BACKEND_BIND=0.0.0.0 in .env only if you intentionally want to expose
    # the backend directly (e.g. for an external load balancer).
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:8000:8000"
    environment:
      DATABASE_URL: postgresql://dummar:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/dummar_db
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: dummar
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env (32+ random chars; run ./deploy.sh to auto-generate)}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      UPLOAD_DIR: /app/uploads
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      # Background-job system (Celery + Redis)
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    # Celery worker — runs background jobs (PDF generation, OCR pipeline,
    # notification fan-out). Shares the backend image so it has access to
    # the same code and Python dependencies.
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.jobs.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      DATABASE_URL: postgresql://dummar:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/dummar_db
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: dummar
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      ALGORITHM: HS256
      UPLOAD_DIR: /app/uploads
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: "false"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # `inspect ping` succeeds when at least one worker in the cluster
      # responds. This is robust to the container hostname (which Celery
      # appends to the worker node name) so we don't need to template it in.
      test: ["CMD-SHELL", "celery -A app.jobs.celery_app inspect ping || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - backend_uploads:/usr/share/nginx/uploads:ro
      # SSL certificates — mounted unconditionally so HTTPS enablement does
      # NOT require hand-editing docker-compose.yml on the VPS. The paths
      # default to the standard Let's Encrypt / certbot locations and are
      # read-only. When certs do not yet exist Docker will create empty
      # directories on the host (no-op for the HTTP-only nginx.conf). Once
      # ssl-setup.sh has obtained certs and nginx-ssl.conf is in place, the
      # same mounts already resolve correctly — no further compose changes.
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ${CERTBOT_WEBROOT:-/var/www/certbot}:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Use a dedicated /nginx-health endpoint that returns 200 on both HTTP
      # and HTTPS server blocks (see nginx.conf / nginx-ssl.conf). The old
      # probe hit "http://localhost:80/", which under the SSL-enabled config
      # returns 301 → https://<server_name>/ and then fails TLS inside the
      # container, causing false "unhealthy" even when the site was fine.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
