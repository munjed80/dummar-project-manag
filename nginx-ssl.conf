# =============================================================================
# Dummar Project — SSL-enabled nginx reverse proxy configuration
# =============================================================================
# Replace every occurrence of DOMAIN_PLACEHOLDER with your actual domain name.
# Example:  sed -i 's/DOMAIN_PLACEHOLDER/dummar.example.com/g' nginx-ssl.conf
#
# This is normally done automatically by deploy.sh's SSL self-heal block when
# you pass --domain=<domain> AND a Let's Encrypt cert exists for that domain.
# =============================================================================

# Rate limiting zones (shared with HTTP and HTTPS server blocks)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name DOMAIN_PLACEHOLDER;

    # Lightweight healthcheck for docker/orchestrator probes.
    # Must be defined BEFORE the catch-all redirect so docker healthchecks
    # hitting http://localhost/ on port 80 don't get a 301 to an HTTPS URL
    # that doesn't resolve inside the container.
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Let's Encrypt ACME challenge (must remain accessible over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name DOMAIN_PLACEHOLDER;

    # ------------------------------------------------------------------
    # Dynamic upstream resolution.
    #
    # Without this, nginx resolves `backend` ONCE at config-load time and
    # aborts with "host not found in upstream" if the backend container
    # is not yet reachable. That made every nginx restart racy: a normal
    # `docker compose up -d` could leave nginx stuck in a crash-loop
    # ("running" but unhealthy, with port 443 closing connections →
    # "Empty reply from server" / Cloudflare 521).
    #
    # The Docker embedded DNS lives at 127.0.0.11. We list it FIRST so
    # internal service names resolve fast; the public resolvers are kept
    # as a fallback for OCSP stapling lookups (ssl_stapling below).
    # Combined with a *variable* in proxy_pass, this defers DNS to
    # request time so nginx starts cleanly even when backend is briefly
    # unreachable, and just returns 502 until backend recovers.
    # ------------------------------------------------------------------
    resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=10s ipv6=off;
    resolver_timeout 5s;
    set $backend_upstream "backend:8000";

    # ------------------------------------------------------------------
    # TLS configuration
    # ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    # TLS 1.3 ciphersuites are automatically negotiated by the protocol;
    # this directive only controls TLS 1.2 cipher selection.
    ssl_ciphers 'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (uses the resolver above)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Client upload size (matches backend 20MB limit for contract intelligence)
    client_max_body_size 20M;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ------------------------------------------------------------------
    # Frontend SPA — serve from dist/
    # ------------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # PWA service worker — no caching
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # PWA manifest — short cache
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # ------------------------------------------------------------------
    # Auth endpoints — tighter rate limit
    # ------------------------------------------------------------------
    location ~ ^/api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ------------------------------------------------------------------
    # Contract intelligence uploads — upload rate limit + extended timeout
    # ------------------------------------------------------------------
    location ~ ^/api/contract-intelligence/(upload|bulk-import) {
        limit_req zone=upload_limit burst=3 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ------------------------------------------------------------------
    # API reverse proxy
    # ------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ------------------------------------------------------------------
    # File uploads — split between PUBLIC and SENSITIVE categories.
    # SENSITIVE (contracts, contract_intelligence) require backend auth.
    # PUBLIC (complaints, profiles, general, tasks) served as static files.
    # ------------------------------------------------------------------
    location ~ ^/uploads/(contracts|contract_intelligence)/ {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------------
    # Healthcheck endpoint — also exposed over HTTPS for external probes.
    # ------------------------------------------------------------------
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ------------------------------------------------------------------
    # Health endpoints — /health and /health/ready are public (probes).
    # /health/detailed, /health/ocr require backend auth.
    # ------------------------------------------------------------------
    location ~ ^/health {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ------------------------------------------------------------------
    # Metrics endpoint — proxied; backend requires internal-staff auth.
    # ------------------------------------------------------------------
    location = /metrics {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
