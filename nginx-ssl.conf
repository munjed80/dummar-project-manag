# =============================================================================
# Dummar Project — SSL-enabled nginx reverse proxy configuration
# =============================================================================
# Replace every occurrence of DOMAIN_PLACEHOLDER with your actual domain name.
# Example:  sed -i 's/DOMAIN_PLACEHOLDER/dummar.example.com/g' nginx-ssl.conf
# =============================================================================

# Rate limiting zones (shared with HTTP and HTTPS server blocks)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt ACME challenge (must remain accessible over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name DOMAIN_PLACEHOLDER;

    # ------------------------------------------------------------------
    # TLS configuration
    # ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    # TLS 1.3 ciphersuites are automatically negotiated by the protocol;
    # this directive only controls TLS 1.2 cipher selection.
    ssl_ciphers 'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Client upload size (matches backend 20MB limit for contract intelligence)
    client_max_body_size 20M;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ------------------------------------------------------------------
    # Frontend SPA — serve from dist/
    # ------------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # PWA service worker — no caching
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # PWA manifest — short cache
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # ------------------------------------------------------------------
    # Auth endpoints — tighter rate limit
    # ------------------------------------------------------------------
    location ~ ^/api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ------------------------------------------------------------------
    # Contract intelligence uploads — upload rate limit + extended timeout
    # ------------------------------------------------------------------
    location ~ ^/api/contract-intelligence/(upload|bulk-import) {
        limit_req zone=upload_limit burst=3 nodelay;

        proxy_pass http://backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ------------------------------------------------------------------
    # API reverse proxy
    # ------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ------------------------------------------------------------------
    # File uploads — served by nginx directly
    # ------------------------------------------------------------------
    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------------
    # Health check endpoints — direct proxy, no rate limit
    # ------------------------------------------------------------------
    location ~ ^/health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ------------------------------------------------------------------
    # Metrics endpoint — direct proxy
    # ------------------------------------------------------------------
    location = /metrics {
        proxy_pass http://backend:8000/metrics;
        proxy_set_header Host $host;
    }
}
