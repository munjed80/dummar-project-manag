# Dummar Project — nginx reverse proxy configuration
# Used by docker-compose.yml nginx service

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

server {
    listen 80;
    # IMPORTANT: Change to your actual domain in production
    # e.g., server_name dummar.example.com;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client upload size (matches backend 20MB limit for contract intelligence)
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # Frontend SPA — serve from dist/
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # PWA service worker — no caching
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # PWA manifest — short cache
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # Auth endpoints — tighter rate limit
    location ~ ^/api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Contract intelligence uploads — upload rate limit + extended timeout
    location ~ ^/api/contract-intelligence/(upload|bulk-import) {
        limit_req zone=upload_limit burst=3 nodelay;

        proxy_pass http://backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # API reverse proxy
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # File uploads — split between PUBLIC and SENSITIVE categories.
    #
    # SENSITIVE (contracts, contract_intelligence): proxied to the backend so
    # auth is enforced (see app/api/uploads.py). These contain confidential
    # operational documents and must NOT be served by nginx as static files.
    location ~ ^/uploads/(contracts|contract_intelligence)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # PUBLIC uploads (complaints attachments, profile photos, generic, tasks):
    # served directly by nginx for performance. Anonymous-readable by URL.
    # Filenames are random UUIDs; do not place confidential data here.
    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Lightweight healthcheck endpoint for docker/orchestrator probes.
    # Bypasses SPA fallback, rate limits, and backend proxying. Kept here
    # (not under /health) so it always returns 200 locally even when the
    # backend is temporarily unhealthy.
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Health check endpoints — split between PUBLIC liveness and INTERNAL detail.
    #
    # /health and /health/ready are kept public so orchestrators / load
    # balancers / uptime monitors can hit them without credentials.
    #
    # /health/detailed, /health/ocr, and /metrics expose
    # operational data and require backend auth (internal staff). They are
    # proxied normally; the backend rejects unauthenticated requests.
    location ~ ^/health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Metrics endpoint — direct proxy. Backend requires internal-staff auth.
    location = /metrics {
        proxy_pass http://backend:8000/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
